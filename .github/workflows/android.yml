name: Build Debug APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # O GitHub Actions já tem o Android SDK instalado, mas garantimos as variáveis
      - name: Set Android SDK environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      # Cria .env com segurança (se não existir .env.example, cria vazio)
      - name: Create .env file
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

      # Dá permissão de execução ao gradlew
      - name: Make gradlew executable
        run: chmod +x gradlew

      # (OPCIONAL) Valida o wrapper do Gradle – ajuda a evitar erros de download
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      # 🔍 DIAGNÓSTICO: lista os arquivos do projeto para ver se está tudo no lugar
      - name: List project files (debug)
        run: |
          echo "=== Estrutura do projeto ==="
          ls -la
          echo "=== Conteúdo da pasta app (se existir) ==="
          ls -la app/ || echo "Pasta app não encontrada"
          echo "=== Versão do Gradle ==="
          ./gradlew --version || echo "Gradle wrapper não executável"

      # Build do APK de depuração (com stacktrace para ver erro detalhado)
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug -x test --no-daemon --stacktrace

      # Upload do APK se der certo
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PronoElite-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
