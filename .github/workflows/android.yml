name: Build Debug APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set Android SDK environment
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Create .env file (with dummy values if needed)
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            cat > .env <<EOF
            # Adicione aqui as variáveis que seu projeto precisa
            DUMMY_VAR=value
            EOF
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      # 🔥 SEM VALIDAÇÃO – REMOVIDA
      # - name: Validate Gradle wrapper  <-- COMENTADO

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug -x test --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PronoElite-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
