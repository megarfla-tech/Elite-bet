name: Build Android APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create .env file
        run: cp .env.example .env

      - name: Setup Debug Keystore (with Fallback)
        run: |
          # 1. Decode cleanly with Python to prevent any line-ending/CRLF corruption under Git checkout
          if [ -f debug.keystore.base64 ]; then
            echo "Decoding debug.keystore.base64..."
            python3 -c "import base64; data = open('debug.keystore.base64', 'rb').read().replace(b'\r', b'').replace(b'\n', b''); decoded = base64.b64decode(data); open('debug.keystore', 'wb').write(decoded)"
          fi
          
          # 2. Verify keystore integrity, if corrupt or password mismatch, generate a pristine standard debug keystore
          if [ -f debug.keystore ] && keytool -list -keystore debug.keystore -storepass android > /dev/null 2>&1; then
            echo "✅ Decoded debug.keystore successfully verified!"
          else
            echo "⚠️ Decoded debug.keystore was corrupt, unreadable, or missing. Generating a fresh standard debug.keystore..."
            rm -f debug.keystore
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
            echo "✅ Fresh debug.keystore generated successfully!"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.3.1'

      - name: Build Debug APK
        run: gradle :app:assembleDebug -x test --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PronoElite-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
