name: Build Debug APK

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Importante: define os caminhos do SDK que já vêm no GitHub
      - name: Set Android SDK path
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Create .env (se existir)
        run: |
          if [ -f .env.example ]; then cp .env.example .env; else touch .env; fi

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug -x test --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PronoElite-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PronoElite-Debug-APK
          path: app/build/outputs/apk/debug/*.apk
